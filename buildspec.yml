version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm install -g npm@10
  pre_build:
    commands:
      - npm ci
  build:
    commands:
      - npm run lint --if-present
      - npm run build
  post_build:
    commands:
      - echo "Build completed on $(date -u +%Y-%m-%dT%H:%M:%SZ)"

artifacts:
  base-directory: .next
  files:
    - '**/*'

cache:
  paths:
    - node_modules/**/*
