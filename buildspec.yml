version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
  pre_build:
    commands:
      - cd backend
      - npm ci
  build:
    commands:
      - echo "No backend build step"
  post_build:
    commands:
      - echo "Backend bundle ready for CodeDeploy"

artifacts:
  files:
    - appspec.yml
    - ecosystem.config.js
    - scripts/**/*
    - backend/**/*

cache:
  paths:
    - backend/node_modules/**/*
